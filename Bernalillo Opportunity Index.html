<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bernalillo County Opportunity Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <link rel="stylesheet" href="app/styles.css">
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="app/layers.js"></script>
  <script type="text/babel" src="app/app.jsx"></script>
  <script type="text/babel">
    (async () => {
      const res = await fetch('data/tracts.json');
      const tracts = await res.json();
      const districtRes = await fetch('data/commission_districts.json');
      const commissionDistricts = await districtRes.json();
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<window.BernAppMain tracts={tracts} commissionDistricts={commissionDistricts} />);
    })().catch((err) => {
      document.getElementById('root').innerHTML = `<main class="error"><h1>Could not load map data</h1><p>${err.message}</p><p>Run this through a local server: <code>python -m http.server 8000</code>.</p></main>`;
      console.error(err);
    });
  </script>
</body>
</html>
